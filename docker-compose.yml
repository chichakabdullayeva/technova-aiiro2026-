version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kiber-dnt-postgres
    environment:
      POSTGRES_DB: kiberdnt
      POSTGRES_USER: kiberdnt
      POSTGRES_PASSWORD: kiberdnt_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiberdnt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kiber-dnt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kiber-dnt-api
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://kiberdnt:kiberdnt_secret@postgres:5432/kiberdnt
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: kiber-dnt-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://kiberdnt:kiberdnt_secret@postgres:5432/kiberdnt
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker/src:/app/apps/worker/src

  ai-engine:
    build:
      context: .
      dockerfile: apps/ai-engine/Dockerfile
    container_name: kiber-dnt-ai
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/ai-engine/src:/app/apps/ai-engine/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: kiber-dnt-web
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: http://localhost:4000
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src

volumes:
  postgres_data:
  redis_data:
